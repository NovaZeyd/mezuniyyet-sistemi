function calcEmployeeData(emp) {
  const today = new Date();
  const start = new Date(emp.startDate);
  const diffDays = (today - start) / (1000 * 60 * 60 * 24);
  const yearsWorked = diffDays / 365;
  const earnedDays = yearsWorked * 21;
  const remainingDays = Math.max(0, earnedDays - (emp.usedDays || 0));
  const compensation = remainingDays * (emp.salary / 30.4);
  let status = "Normal", statusColor = "#10b981";
  if (remainingDays > 30) { status = "Məzuniyyətə çıxmalı!"; statusColor = "#ef4444"; }
  else if (remainingDays > 21) { status = "Planlaşdırılmalı"; statusColor = "#f59e0b"; }
  return { ...emp, yearsWorked, earnedDays, remainingDays, compensation, status, statusColor };
}

function fmtDate(d) {
  if (!d) return "";
  return new Date(d).toLocaleDateString("az-AZ");
}

function toAZN(n) {
  return Number(n).toLocaleString("az-AZ", { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + " ₼";
}

function genOrder(emp, leaveStart, days) {
  const d = calcEmployeeData(emp);
  const s = new Date(leaveStart), e = new Date(s);
  e.setDate(e.getDate() + days - 1);
  const today = new Date();
  return `ƏMƏK MƏZUNİYYƏTİ ƏMR-İ\n\nSıra №: MEZ-${emp.id}-${today.toISOString().slice(0,10)}\nTarix: ${fmtDate(today)}\n\nMÜESSİSƏ: _______________________________________\n\nƏMƏR:\n\n${emp.name} – ${emp.position} vəzifəsindəki işçiyə\n\nMəzuniyyət dövrü: ${fmtDate(leaveStart)} – ${fmtDate(e)}\nMəzuniyyət günlərinin sayı: ${days} təqvim günü\nİşə başlama tarixi: ${fmtDate(emp.startDate)}\nİş stajı: ${d.yearsWorked.toFixed(2)} il\nQazanılmış məzuniyyət günləri: ${d.earnedDays.toFixed(2)} gün\nİstifadə edilmiş günlər: ${emp.usedDays || 0} gün\nQalan məzuniyyət günləri: ${d.remainingDays.toFixed(2)} gün\n\nAylıq əmək haqqı: ${toAZN(d.salary)}\nOrta gündəlik əmək haqqı: ${toAZN(d.salary / 30.4)}\nÜmumi məzuniyyət haqqı: ${toAZN((d.salary / 30.4) * days)}\n\nQeyd: Əmək Məcəlləsinin 111-ci maddəsinə əsasən (332-VIIQD, 30.12.2025)\nsonuncu əməkhaqqından az olmamaqla orta əməkhaqqı saxlanılır.\n\nİmza: _________________________ Müdir: _________________________\nTarix: ${fmtDate(today)}`;
}

function genApp(emp, leaveStart, days, reason) {
  const today = new Date();
  const s = new Date(leaveStart), e = new Date(s);
  e.setDate(e.getDate() + days - 1);
  return `ƏRİZƏ\n\nMüəssisə rəhbərinə\n\nMən, ${emp.name}, ${emp.position} vəzifəsini icra edərək,\n${fmtDate(emp.startDate)} tarixindən müəssisədə çalışıram.\n\nƏmək Məcəlləsinin 112-ci maddəsinə əsasən mənə əsas əmək\nməzuniyyəti verilməsini xahiş edirəm.\n\nMəzuniyyət dövrü: ${fmtDate(leaveStart)} – ${fmtDate(e)}\nMəzuniyyət günlərinin sayı: ${days} təqvim günü\n${reason ? `Əlavə qeyd: ${reason}\n` : ""}\nTarix: ${fmtDate(today)}\nİmza: _________________________\nAd, soyad: ${emp.name}`;
}

// ── MAIN ────────────────────────────────────────────────────────────────────
function App() {
  const [emps, setEmps] = useState(INITIAL_EMPLOYEES);
  const [search, setSearch] = useState("");
  const [filter, setFilter] = useState("all");
  const [docEmp, setDocEmp] = useState(null);
  const [showAdd, setShowAdd] = useState(false);
  const [tab, setTab] = useState("dashboard");

  // calc tab state
  const [cSalary, setCSalary] = useState(1000);
  const [cDays, setCDays] = useState(21);
  const [cPrev, setCPrev] = useState(Array(12).fill(1000));
  const cAvg = cPrev.reduce((a,b)=>a+Number(b),0)/12;
  const cBase = Math.max(cSalary, cAvg);
  const cTotal = (cBase/30.4)*cDays;

  const computed = emps.map(calcEmployeeData);
  const urgent = computed.filter(e=>e.status==="Məzuniyyətə çıxmalı!");
  const plan = computed.filter(e=>e.status==="Planlaşdırılmalı");
  const normal = computed.filter(e=>e.status==="Normal");
  const totalComp = computed.reduce((a,e)=>a+e.compensation,0);
  const totalDays = computed.reduce((a,e)=>a+e.remainingDays,0);

  const filtered = computed.filter(e=>{
    const ms = e.name.toLowerCase().includes(search.toLowerCase()) || e.position.toLowerCase().includes(search.toLowerCase());
    const mf = filter==="all"||(filter==="urgent"&&e.status==="Məzuniyyətə çıxmalı!")||(filter==="plan"&&e.status==="Planlaşdırılmalı")||(filter==="normal"&&e.status==="Normal");
    return ms && mf;
  });

  const addEmp = f => setEmps(p=>[...p,{id:p.length+1,name:f.name.toUpperCase(),position:f.position,startDate:f.startDate,salary:parseFloat(f.salary),usedDays:0}]);

  const nav = [["dashboard","📊","Ana Səhifə"],["employees","👥","İşçilər"],["calc","🧮","Hesablama"]];

  return (
    <div style={{background:"#060d16",minHeight:"100vh",display:"flex"}}>
      {/* SIDEBAR */}
      <div style={{width:"220px",background:"#0a1420",borderRight:"1px solid #1e3a5f",position:"fixed",top:0,left:0,bottom:0,display:"flex",flexDirection:"column",padding:"24px 0",zIndex:100}}>
        <div style={{padding:"0 24px 20px"}}>
          <div style={{fontSize:"10px",letterSpacing:"2px",color:"#3b82f6",fontWeight:700,marginBottom:"4px"}}>ƏMƏK MƏCƏLLƏSI</div>
          <div style={{fontSize:"16px",fontWeight:800,color:"#e2e8f0",lineHeight:1.3}}>Məzuniyyət<br/>Sistemi</div>
          <div style={{fontSize:"10px",color:"#334155",marginTop:"4px"}}>332-VIIQD • 2026</div>
        </div>
        <div style={{height:"1px",background:"#1e3a5f",margin:"0 0 12px"}}/>
        {nav.map(([k,ic,lb])=>(
          <div key={k} onClick={()=>setTab(k)} style={{display:"flex",alignItems:"center",gap:"10px",padding:"11px 24px",cursor:"pointer",color:tab===k?"#3b82f6":"#64748b",background:tab===k?"rgba(59,130,246,0.1)":"transparent",borderLeft:tab===k?"3px solid #3b82f6":"3px solid transparent",fontSize:"13px",fontWeight:tab===k?700:500,transition:"all 0.15s"}}>
            <span>{ic}</span><span>{lb}</span>
          </div>
        ))}
        <div style={{marginTop:"auto",padding:"0 24px"}}>
          <div style={{color:"#334155",fontSize:"10px",marginBottom:"6px"}}>BUGÜN</div>
          <div style={{color:"#64748b",fontSize:"12px"}}>{new Date().toLocaleDateString("az-AZ",{day:"numeric",month:"long",year:"numeric"})}</div>
        </div>
      </div>

      {/* MAIN CONTENT */}
      <div style={{marginLeft:"220px",padding:"28px 32px",flex:1,minHeight:"100vh"}}>

        {/* ── DASHBOARD ── */}
        {tab==="dashboard" && (
          <div>
            <div style={{marginBottom:"26px"}}>
              <div style={{fontSize:"10px",letterSpacing:"2px",color:"#3b82f6",fontWeight:700,marginBottom:"6px"}}>ANA SƏHIFƏ</div>
              <div style={{fontSize:"26px",fontWeight:800}}>Məzuniyyət İcmalı</div>
              <div style={{color:"#64748b",fontSize:"14px",marginTop:"4px"}}>Əmək Məcəlləsi Maddə 111 • 332-VIIQD əsasında</div>
            </div>
            {/* Stat cards */}
            <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:"14px",marginBottom:"24px"}}>
              {[["Ümumi İşçi",emps.length,"#3b82f6","👥"],["Təcili",urgent.length,"#ef4444","🔴"],["Planlaşdırılmalı",plan.length,"#f59e0b","🟡"],["Normal",normal.length,"#10b981","🟢"]].map(([l,v,c,ic])=>(
                <div key={l} style={{background:"#0a1420",border:`1px solid ${c}30`,borderRadius:"14px",padding:"18px"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                    <div>
                      <div style={{color:"#64748b",fontSize:"10px",fontWeight:700,letterSpacing:"1px"}}>{l.toUpperCase()}</div>
                      <div style={{color:c,fontSize:"36px",fontWeight:800,lineHeight:1.1,marginTop:"4px"}}>{v}</div>
                    </div>
                    <span style={{fontSize:"26px"}}>{ic}</span>
                  </div>
                </div>
              ))}
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"14px",marginBottom:"26px"}}>
              <div style={{background:"#0a1420",border:"1px solid #1e3a5f",borderRadius:"14px",padding:"18px"}}>
                <div style={{color:"#64748b",fontSize:"10px",fontWeight:700,letterSpacing:"1px",marginBottom:"8px"}}>ÜMUMİ QALIQ GÜNLƏR</div>
                <div style={{color:"#3b82f6",fontSize:"32px",fontWeight:800}}>{totalDays.toFixed(0)}</div>
                <div style={{color:"#64748b",fontSize:"12px",marginTop:"4px"}}>Bütün işçilər üzrə</div>
              </div>
              <div style={{background:"#0a1420",border:"1px solid #1e3a5f",borderRadius:"14px",padding:"18px"}}>
                <div style={{color:"#64748b",fontSize:"10px",fontWeight:700,letterSpacing:"1px",marginBottom:"8px"}}>ÜMUMİ KOMPENSASİYA</div>
                <div style={{color:"#34d399",fontSize:"28px",fontWeight:800}}>{toAZN(totalComp)}</div>
                <div style={{color:"#64748b",fontSize:"12px",marginTop:"4px"}}>Bütün qalıq günlər üzrə</div>
              </div>
            </div>
            {urgent.length>0 && (
              <div>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"14px"}}>
                  <div>
                    <div style={{fontSize:"16px",fontWeight:700,color:"#ef4444"}}>🔴 Məzuniyyətə çıxmalı!</div>
                    <div style={{color:"#64748b",fontSize:"13px"}}>30 gündən artıq qalıq günü olan işçilər</div>
                  </div>
                  <button onClick={()=>setTab("employees")} style={{background:"transparent",border:"1px solid #1e3a5f",borderRadius:"8px",padding:"7px 14px",color:"#64748b",cursor:"pointer",fontSize:"12px"}}>Hamısına bax →</button>
                </div>
                <div style={{display:"flex",flexDirection:"column",gap:"10px"}}>
                  {urgent.slice(0,6).map(e=><EmpRow key={e.id} emp={e} onDoc={setDocEmp}/>)}
                  {urgent.length>6 && <div style={{textAlign:"center",color:"#64748b",fontSize:"13px",padding:"8px"}}>+{urgent.length-6} daha işçi...</div>}
                </div>
              </div>
            )}
          </div>
        )}

        {/* ── EMPLOYEES ── */}
        {tab==="employees" && (
          <div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"22px"}}>
              <div>
                <div style={{fontSize:"10px",letterSpacing:"2px",color:"#3b82f6",fontWeight:700,marginBottom:"6px"}}>İŞÇİLƏR</div>
                <div style={{fontSize:"26px",fontWeight:800}}>Bütün İşçilər</div>
                <div style={{color:"#64748b",fontSize:"14px"}}>{filtered.length} / {emps.length} nəticə</div>
              </div>
              <button onClick={()=>setShowAdd(true)} style={{background:"linear-gradient(135deg,#1d4ed8,#3b82f6)",border:"none",borderRadius:"10px",padding:"11px 20px",color:"#fff",cursor:"pointer",fontSize:"14px",fontWeight:700}}>+ İşçi əlavə et</button>
            </div>
            <div style={{display:"flex",gap:"12px",marginBottom:"18px",flexWrap:"wrap"}}>
              <input placeholder="🔍 Ad və ya vəzifə axtar..." value={search} onChange={e=>setSearch(e.target.value)}
                style={{flex:1,minWidth:"200px",background:"#0a1420",border:"1px solid #1e3a5f",borderRadius:"8px",padding:"10px 14px",color:"#e2e8f0",fontSize:"14px"}}/>
              <div style={{display:"flex",gap:"8px"}}>
                {[["all","Hamısı","#3b82f6"],["urgent","Təcili","#ef4444"],["plan","Planlaşdır","#f59e0b"],["normal","Normal","#10b981"]].map(([v,l,c])=>(
                  <button key={v} onClick={()=>setFilter(v)} style={{padding:"7px 13px",borderRadius:"20px",cursor:"pointer",fontSize:"12px",fontWeight:700,border:"1px solid",borderColor:filter===v?c:"#1e3a5f",background:filter===v?`${c}18`:"transparent",color:filter===v?c:"#64748b"}}>{l}</button>
                ))}
              </div>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:"10px"}}>
              {filtered.map(e=><EmpRow key={e.id} emp={e} onDoc={setDocEmp}/>)}
              {filtered.length===0 && <div style={{textAlign:"center",padding:"60px",color:"#334155"}}><div style={{fontSize:"40px",marginBottom:"12px"}}>🔍</div><div>Nəticə tapılmadı</div></div>}
            </div>
          </div>
        )}

        {/* ── CALC ── */}
        {tab==="calc" && (
          <div>
            <div style={{marginBottom:"26px"}}>
              <div style={{fontSize:"10px",letterSpacing:"2px",color:"#3b82f6",fontWeight:700,marginBottom:"6px"}}>KALKULYATOR</div>
              <div style={{fontSize:"26px",fontWeight:800}}>Məzuniyyət Hesablama</div>
              <div style={{color:"#64748b",fontSize:"14px"}}>Maddə 111 – Sonuncu əməkhaqqından az olmamaqla</div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"22px"}}>
              <div>
                <div style={{background:"#0a1420",border:"1px solid #1e3a5f",borderRadius:"14px",padding:"20px",marginBottom:"14px"}}>
                  <div style={{color:"#64748b",fontSize:"10px",fontWeight:700,letterSpacing:"1px",marginBottom:"16px"}}>MÜQAVİLƏ PARAMETRLƏRİ</div>
                  {[["Sonuncu (müqavilə üzrə) əməkhaqqı ₼","number",cSalary,setCSalary],["Məzuniyyət günləri","number",cDays,setCDays]].map(([lbl,t,v,sv])=>(
                    <div key={lbl} style={{marginBottom:"14px"}}>
                      <div style={{color:"#94a3b8",fontSize:"12px",marginBottom:"6px"}}>{lbl}</div>
                      <input type={t} value={v} onChange={e=>sv(Number(e.target.value))} style={{width:"100%",background:"#060d16",border:"1px solid #1e3a5f",borderRadius:"8px",padding:"9px 12px",color:"#e2e8f0",fontSize:"14px"}}/>
                    </div>
                  ))}
                </div>
                <div style={{background:"#0a1420",border:"1px solid #1e3a5f",borderRadius:"14px",padding:"20px"}}>
                  <div style={{color:"#64748b",fontSize:"10px",fontWeight:700,letterSpacing:"1px",marginBottom:"14px"}}>SON 12 AYLIK QAZANC (₼)</div>
                  {cPrev.map((v,i)=>(
                    <div key={i} style={{display:"flex",alignItems:"center",gap:"10px",marginBottom:"7px"}}>
                      <span style={{color:"#64748b",fontSize:"12px",width:"70px",flexShrink:0}}>{new Date(new Date().setMonth(new Date().getMonth()-11+i)).toLocaleDateString("az-AZ",{month:"short",year:"2-digit"})}</span>
                      <input type="number" value={v} onChange={e=>setCPrev(p=>{const n=[...p];n[i]=Number(e.target.value);return n;})} style={{flex:1,background:"#060d16",border:"1px solid #1e3a5f",borderRadius:"6px",padding:"6px 10px",color:"#e2e8f0",fontSize:"13px"}}/>
                    </div>
                  ))}
                </div>
              </div>
              <div>
                <div style={{background:"#0a1420",border:"1px solid rgba(59,130,246,0.3)",borderRadius:"14px",padding:"20px",marginBottom:"14px"}}>
                  <div style={{color:"#64748b",fontSize:"10px",fontWeight:700,letterSpacing:"1px",marginBottom:"18px"}}>NƏTİCƏ</div>
                  {[["Sonuncu əməkhaqqı",toAZN(cSalary),"#e2e8f0"],["12 aylıq orta əmkh.",toAZN(cAvg),"#e2e8f0"],["Hesablama əsası",toAZN(cBase),cBase===cSalary?"#f59e0b":"#34d399"],["Gündəlik məbləğ",toAZN(cBase/30.4),"#3b82f6"]].map(([l,v,c])=>(
                    <div key={l} style={{display:"flex",justifyContent:"space-between",marginBottom:"12px",alignItems:"center"}}>
                      <span style={{color:"#64748b",fontSize:"13px"}}>{l}</span>
                      <span style={{color:c,fontSize:"15px",fontWeight:700}}>{v}</span>
                    </div>
                  ))}
                  <div style={{height:"1px",background:"#1e3a5f",margin:"14px 0"}}/>
                  <div style={{textAlign:"center"}}>
                    <div style={{color:"#64748b",fontSize:"12px",marginBottom:"6px"}}>ÜMUMİ MƏZUNIYYƏT HAKKI ({cDays} gün)</div>
                    <div style={{color:"#34d399",fontSize:"38px",fontWeight:800}}>{toAZN(cTotal)}</div>
                  </div>
                </div>
                <div style={{background:"#0a1420",border:"1px solid rgba(245,158,11,0.2)",borderRadius:"14px",padding:"20px"}}>
                  <div style={{color:"#f59e0b",fontSize:"10px",fontWeight:700,letterSpacing:"1px",marginBottom:"10px"}}>📋 MADDƏ 111 QAYDASI</div>
                  <div style={{color:"#94a3b8",fontSize:"13px",lineHeight:1.7}}>
                    {cBase===cSalary
                      ? <span>⚠️ <strong style={{color:"#f59e0b"}}>Sonuncu əməkhaqqı</strong> orta əməkhaqqından böyükdür — hesablamada sonuncu əməkhaqqı əsas götürülür.</span>
                      : <span>✅ <strong style={{color:"#34d399"}}>Orta əməkhaqqı</strong> sonuncu əməkhaqqından böyükdür — hesablamada orta əməkhaqqı əsas götürülür.</span>
                    }
                  </div>
                  <div style={{marginTop:"10px",padding:"10px",background:"#060d16",borderRadius:"8px",fontSize:"11px",color:"#64748b",fontStyle:"italic"}}>
                    "...sonuncu əməkhaqqından az olmamaqla, orta əməkhaqqı saxlanılır..." — Maddə 111, hissə 1
                  </div>
                </div>
              </div>
            </div>
          </div>
        )}
      </div>

      {docEmp && <DocModal emp={docEmp} onClose={()=>setDocEmp(null)}/>}
      {showAdd && <AddModal onAdd={addEmp} onClose={()=>setShowAdd(false)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
