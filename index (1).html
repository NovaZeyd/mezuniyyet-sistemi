// ── HELPERS ────────────────────────────────────────────────────────────────
function calc(emp){
  const today=new Date(),start=new Date(emp.startDate);
  const yrs=(today-start)/86400000/365;
  const earned=yrs*21;
  const rem=Math.max(0,earned-(emp.usedDays||0));
  const comp=rem*(emp.salary/30.4);
  let status="Normal",sc="#10b981";
  if(rem>30){status="Məzuniyyətə çıxmalı!";sc="#ef4444";}
  else if(rem>21){status="Planlaşdırılmalı";sc="#f59e0b";}
  return{...emp,yrs,earned,rem,comp,status,sc};
}
function fd(d){if(!d)return"";return new Date(d).toLocaleDateString("az-AZ");}
function azn(n){return Number(n).toLocaleString("az-AZ",{minimumFractionDigits:2,maximumFractionDigits:2})+" ₼";}
function normDate(v){
  if(!v)return"";
  if(typeof v==="number"){const d=new Date((v-25569)*86400000);return d.toISOString().slice(0,10);}
  const s=String(v);
  const m=s.match(/^(\d{1,2})[.\/\-](\d{1,2})[.\/\-](\d{4})$/);
  if(m)return`${m[3]}-${m[2].padStart(2,"0")}-${m[1].padStart(2,"0")}`;
  if(/^\d{4}-\d{2}-\d{2}/.test(s))return s.slice(0,10);
  return s;
}

}

function genPDF(title,lines){
  const esc=s=>s.replace(/\\/g,"\\\\").replace(/\(/g,"\\(").replace(/\)/g,"\\)");
  let y=760,sl=["BT","/F1 13 Tf",`50 ${y} Td`,`(${esc(title)}) Tj`];
  y-=26; sl.push("/F1 10 Tf");
  lines.forEach(l=>{sl.push(`50 ${y} Td`);sl.push(`(${esc(l)}) Tj`);y-=16;});
  sl.push("ET");
  const stream=sl.join("\n");
  return `%PDF-1.4\n1 0 obj<</Type/Catalog/Pages 2 0 R>>endobj\n2 0 obj<</Type/Pages/Kids[3 0 R]/Count 1>>endobj\n3 0 obj<</Type/Page/Parent 2 0 R/MediaBox[0 0 595 842]/Contents 4 0 R/Resources<</Font<</F1 5 0 R>>>>>>endobj\n4 0 obj<</Length ${stream.length}>>\nstream\n${stream}\nendstream\nendobj\n5 0 obj<</Type/Font/Subtype/Type1/BaseFont/Helvetica>>endobj\nxref\n0 6\n0000000000 65535 f \n0000000009 00000 n \n0000000058 00000 n \n0000000115 00000 n \n0000000266 00000 n \n${String(350+stream.length).padStart(10,"0")} 00000 n \ntrailer<</Size 6/Root 1 0 R>>\nstartxref\n${420+stream.length}\n%%EOF`;
}

function genRTF(title,lines){
  const esc=s=>s.replace(/\\/g,"\\\\").replace(/\{/g,"\\{").replace(/\}/g,"\\}").split("").map(c=>c.charCodeAt(0)>127?`\\u${c.charCodeAt(0)}?`:c).join("");
  return `{\\rtf1\\ansi\\deff0\n{\\fonttbl{\\f0 Arial;}}\n{\\colortbl;\\red59\\green130\\blue246;}\n\\paperw11906\\paperh16838\\margl1800\\margr1800\\margt1440\\margb1440\n\\f0\\fs22\n{\\b\\fs28\\cf1 ${esc(title)}}\\par\\par\n${lines.map(l=>`${esc(l)}\\par`).join("\n")}\n}`;
}

function dlDoc(fmt,title,lines,fname){
  const content=fmt==="pdf"?genPDF(title,lines):genRTF(title,lines);
  const mime=fmt==="pdf"?"application/pdf":"application/rtf";
  const ext=fmt==="pdf"?".pdf":".doc";
  const blob=new Blob([content],{type:mime});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download=fname+ext;
  a.click();
}

// ── IMPORT MODAL ───────────────────────────────────────────────────────────
function ImportModal({existing,onImport,onClose}){
  const [results,setResults]=useState(null);
  const [loading,setLoading]=useState(false);
  const ref=useRef();

  const handleFile=e=>{
    const file=e.target.files[0];
    if(!file)return;
    setLoading(true);
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const wb=XLSX.read(ev.target.result,{type:"array"});
        const sheet=wb.Sheets[wb.SheetNames[0]];
        const rows=XLSX.utils.sheet_to_json(sheet,{header:1,defval:""});
        let hrow=-1,cm={name:0,position:1,startDate:2,salary:3};
        for(let i=0;i<Math.min(8,rows.length);i++){
          const r=rows[i].map(c=>String(c).toLowerCase());
          const ni=r.findIndex(c=>c.includes("ad")||c.includes("soyad")||c.includes("name"));
          if(ni>=0){
            hrow=i;
            cm={
              name:ni,
              position:r.findIndex(c=>c.includes("vəzifə")||c.includes("vezife")||c.includes("position")),
              startDate:r.findIndex(c=>c.includes("tarix")||c.includes("date")||c.includes("başla")),
              salary:r.findIndex(c=>c.includes("maaş")||c.includes("maas")||c.includes("əmək")||c.includes("emek")||c.includes("salary")),
            };
            break;
          }
        }
        const existNames=new Set(existing.map(e=>e.name.trim().toUpperCase()));
        const parsed=rows.slice(hrow+1).filter(r=>r.some(c=>c!=="")).map(row=>{
          const name=String(row[cm.name]||"").trim().toUpperCase();
          const position=cm.position>=0?String(row[cm.position]||"").trim():"";
          const startDate=normDate(row[cm.startDate]);
          const salary=parseFloat(String(row[cm.salary]||"").replace(/[^\d.]/g,""))||0;
          return{name,position,startDate,salary,exists:existNames.has(name),valid:name.length>2};
        }).filter(r=>r.valid);
        setResults(parsed);
      }catch(err){alert("Excel oxunarkən xəta: "+err.message);}
      setLoading(false);
    };
    reader.readAsArrayBuffer(file);
  };

  const newC=results?results.filter(r=>!r.exists).length:0;
  const skipC=results?results.filter(r=>r.exists).length:0;

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.8)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",padding:"16px"}} onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div style={{background:"#0f1923",border:"1px solid #1e3a5f",borderRadius:"16px",width:"100%",maxWidth:"620px",maxHeight:"85vh",display:"flex",flexDirection:"column"}} className="fade-in">
        <div style={{padding:"16px 20px",borderBottom:"1px solid #1e3a5f",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div style={{color:"#3b82f6",fontSize:"10px",fontWeight:700,letterSpacing:"2px"}}>EXCEL İDXAL</div>
            <div style={{color:"#e2e8f0",fontWeight:700,fontSize:"15px",marginTop:"2px"}}>Excel-dən işçi idxal et</div>
          </div>
          <button onClick={onClose} style={{background:"none",border:"1px solid #1e3a5f",color:"#94a3b8",borderRadius:"8px",padding:"5px 11px",cursor:"pointer",fontSize:"18px"}}>✕</button>
        </div>
        <div style={{padding:"18px",overflowY:"auto",flex:1}}>
          <div style={{border:"2px dashed #1e3a5f",borderRadius:"12px",padding:"28px",textAlign:"center",marginBottom:"14px",cursor:"pointer",transition:"border-color 0.2s"}}
            onMouseEnter={e=>e.currentTarget.style.borderColor="#3b82f6"}
            onMouseLeave={e=>e.currentTarget.style.borderColor="#1e3a5f"}
            onClick={()=>ref.current.click()}>
            <input ref={ref} type="file" accept=".xlsx,.xls,.csv" onChange={handleFile} style={{display:"none"}}/>
            <div style={{fontSize:"34px",marginBottom:"8px"}}>📊</div>
            <div style={{color:"#e2e8f0",fontWeight:600,marginBottom:"4px"}}>Excel faylını seçin</div>
            <div style={{color:"#64748b",fontSize:"13px"}}>(.xlsx, .xls, .csv)</div>
            <div style={{marginTop:"10px",background:"rgba(59,130,246,0.08)",border:"1px solid rgba(59,130,246,0.2)",borderRadius:"8px",padding:"8px",fontSize:"12px",color:"#94a3b8"}}>
              Sütunlar: Ad/Soyad • Vəzifə • Tarix • Maaş
            </div>
          </div>
          {loading&&<div style={{textAlign:"center",color:"#64748b",padding:"16px"}}>⏳ Oxunur...</div>}
          {results&&(
            <div>
              <div style={{display:"flex",gap:"10px",marginBottom:"12px"}}>
                <div style={{flex:1,background:"rgba(16,185,129,0.1)",border:"1px solid rgba(16,185,129,0.2)",borderRadius:"10px",padding:"12px",textAlign:"center"}}>
                  <div style={{color:"#34d399",fontSize:"22px",fontWeight:800}}>{newC}</div>
                  <div style={{color:"#64748b",fontSize:"12px"}}>Yeni əlavə ediləcək</div>
                </div>
                <div style={{flex:1,background:"rgba(245,158,11,0.1)",border:"1px solid rgba(245,158,11,0.2)",borderRadius:"10px",padding:"12px",textAlign:"center"}}>
                  <div style={{color:"#f59e0b",fontSize:"22px",fontWeight:800}}>{skipC}</div>
                  <div style={{color:"#64748b",fontSize:"12px"}}>Artıq var (keçiləcək)</div>
                </div>
              </div>
              <div style={{maxHeight:"260px",overflowY:"auto",border:"1px solid #1e3a5f",borderRadius:"10px"}}>
                {results.map((r,i)=>(
                  <div key={i} style={{display:"flex",alignItems:"center",gap:"10px",padding:"9px 13px",borderBottom:i<results.length-1?"1px solid #0f1923":"none"}}>
                    <span>{r.exists?"⏭️":"✅"}</span>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{color:r.exists?"#64748b":"#e2e8f0",fontSize:"13px",fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{r.name}</div>
                      <div style={{color:"#475569",fontSize:"11px"}}>{r.position} • {r.startDate} • {azn(r.salary)}</div>
                    </div>
                    <span style={{fontSize:"11px",padding:"2px 8px",borderRadius:"12px",fontWeight:700,background:r.exists?"rgba(245,158,11,0.1)":"rgba(16,185,129,0.1)",color:r.exists?"#f59e0b":"#34d399"}}>{r.exists?"var":"yeni"}</span>
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>
        {results&&newC>0&&(
          <div style={{padding:"14px 18px",borderTop:"1px solid #1e3a5f"}}>
            <button onClick={()=>{onImport(results.filter(r=>!r.exists));onClose();}} style={{width:"100%",background:"linear-gradient(135deg,#065f46,#10b981)",border:"none",borderRadius:"10px",padding:"11px",color:"#fff",cursor:"pointer",fontSize:"14px",fontWeight:700}}>
              ✅ {newC} yeni işçini əlavə et
            </button>
          </div>
        )}
      </div>
    </div>
  );
}

                <div style={{display:"flex",flexDirection:"column",gap:"8px"}}>
                  {urgent.slice(0,5).map(e=><EmpRow key={e.id} emp={e} onDoc={setDocEmp} onEdit={setEditEmp} onDel={setDelEmp}/>)}
                  {urgent.length>5&&<div style={{textAlign:"center",color:"#64748b",fontSize:"13px",padding:"8px"}}>+{urgent.length-5} daha...</div>}
                </div>
              </div>
            )}
          </div>
        )}

        {/* EMPLOYEES */}
        {tab==="employees"&&(
          <div className="fade-in">
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"18px"}}>
              <div>
                <div style={{fontSize:"10px",letterSpacing:"2px",color:"#3b82f6",fontWeight:700,marginBottom:"5px"}}>İŞÇİLƏR</div>
                <div style={{fontSize:"24px",fontWeight:800}}>Bütün İşçilər</div>
                <div style={{color:"#64748b",fontSize:"13px"}}>{filt.length} / {emps.length} nəticə</div>
              </div>
              <div style={{display:"flex",gap:"7px"}}>
                <button onClick={()=>setShowImport(true)} style={{background:"rgba(16,185,129,0.1)",border:"1px solid rgba(16,185,129,0.3)",borderRadius:"10px",padding:"9px 14px",color:"#34d399",cursor:"pointer",fontSize:"13px",fontWeight:700}}>📊 Excel</button>
                <button onClick={()=>setShowAdd(true)} style={{background:"linear-gradient(135deg,#1d4ed8,#3b82f6)",border:"none",borderRadius:"10px",padding:"9px 16px",color:"#fff",cursor:"pointer",fontSize:"13px",fontWeight:700}}>+ Əlavə et</button>
              </div>
            </div>
            <div style={{display:"flex",gap:"9px",marginBottom:"14px",flexWrap:"wrap"}}>
              <input placeholder="🔍 Ad və ya vəzifə axtar..." value={search} onChange={e=>setSearch(e.target.value)} style={{flex:1,minWidth:"200px",...IS}}/>
              <div style={{display:"flex",gap:"6px"}}>
                {[["all","Hamısı","#3b82f6"],["urgent","Təcili","#ef4444"],["plan","Planlaşdır","#f59e0b"],["normal","Normal","#10b981"]].map(([v,l,c])=>(
                  <button key={v} onClick={()=>setFilter(v)} style={{padding:"6px 11px",borderRadius:"20px",cursor:"pointer",fontSize:"12px",fontWeight:700,border:"1px solid",borderColor:filter===v?c:"#1e3a5f",background:filter===v?`${c}18`:"transparent",color:filter===v?c:"#64748b"}}>{l}</button>
                ))}
              </div>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:"8px"}}>
              {filt.map(e=><EmpRow key={e.id} emp={e} onDoc={setDocEmp} onEdit={setEditEmp} onDel={setDelEmp}/>)}
              {filt.length===0&&<div style={{textAlign:"center",padding:"60px",color:"#334155"}}><div style={{fontSize:"38px",marginBottom:"10px"}}>🔍</div><div>Nəticə tapılmadı</div></div>}
            </div>
          </div>
        )}

        {/* CALC */}
        {tab==="calc"&&(
          <div className="fade-in">
            <div style={{marginBottom:"22px"}}>
              <div style={{fontSize:"10px",letterSpacing:"2px",color:"#3b82f6",fontWeight:700,marginBottom:"5px"}}>KALKULYATOR</div>
              <div style={{fontSize:"24px",fontWeight:800}}>Məzuniyyət Hesablama</div>
              <div style={{color:"#64748b",fontSize:"13px"}}>Maddə 111 – Sonuncu əməkhaqqından az olmamaqla</div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"18px"}}>
              <div>
                <div style={{...CS,marginBottom:"12px"}}>
                  <div style={{color:"#64748b",fontSize:"10px",fontWeight:700,letterSpacing:"1px",marginBottom:"12px"}}>MÜQAVİLƏ PARAMETRLƏRİ</div>
                  {[["Sonuncu (müqavilə üzrə) əməkhaqqı ₼",cS,setCS],["Məzuniyyət günləri",cD,setCD]].map(([lbl,v,sv])=>(
                    <div key={lbl} style={{marginBottom:"12px"}}><div style={{color:"#94a3b8",fontSize:"12px",marginBottom:"5px"}}>{lbl}</div><input type="number" value={v} onChange={e=>sv(Number(e.target.value))} style={IS}/></div>
                  ))}
                </div>
                <div style={CS}>
                  <div style={{color:"#64748b",fontSize:"10px",fontWeight:700,letterSpacing:"1px",marginBottom:"11px"}}>SON 12 AYLIK QAZANC (₼)</div>
                  {cP.map((v,i)=>(
                    <div key={i} style={{display:"flex",alignItems:"center",gap:"9px",marginBottom:"6px"}}>
                      <span style={{color:"#64748b",fontSize:"12px",width:"65px",flexShrink:0}}>{new Date(new Date().setMonth(new Date().getMonth()-11+i)).toLocaleDateString("az-AZ",{month:"short",year:"2-digit"})}</span>
                      <input type="number" value={v} onChange={e=>setCP(p=>{const n=[...p];n[i]=Number(e.target.value);return n;})} style={{...IS,flex:1,padding:"6px 10px",fontSize:"12px"}}/>
                    </div>
                  ))}
                </div>
              </div>
              <div>
                <div style={{...CS,marginBottom:"12px",borderColor:"rgba(59,130,246,0.3)"}}>
                  <div style={{color:"#64748b",fontSize:"10px",fontWeight:700,letterSpacing:"1px",marginBottom:"14px"}}>NƏTİCƏ</div>
                  {[["Sonuncu əməkhaqqı",azn(cS),"#e2e8f0"],["12 aylıq orta əmkh.",azn(cAvg),"#e2e8f0"],["Hesablama əsası",azn(cBase),cBase===cS?"#f59e0b":"#34d399"],["Gündəlik məbləğ",azn(cBase/30.4),"#3b82f6"]].map(([l,v,c])=>(
                    <div key={l} style={{display:"flex",justifyContent:"space-between",marginBottom:"11px",alignItems:"center"}}>
                      <span style={{color:"#64748b",fontSize:"13px"}}>{l}</span>
                      <span style={{color:c,fontSize:"14px",fontWeight:700}}>{v}</span>
                    </div>
                  ))}
                  <div style={{height:"1px",background:"#1e3a5f",margin:"11px 0"}}/>
                  <div style={{textAlign:"center"}}>
                    <div style={{color:"#64748b",fontSize:"12px",marginBottom:"5px"}}>ÜMUMİ ({cD} gün)</div>
                    <div style={{color:"#34d399",fontSize:"36px",fontWeight:800}}>{azn((cBase/30.4)*cD)}</div>
                  </div>
                </div>
                <div style={{...CS,borderColor:"rgba(245,158,11,0.2)"}}>
                  <div style={{color:"#f59e0b",fontSize:"10px",fontWeight:700,letterSpacing:"1px",marginBottom:"9px"}}>📋 MADDƏ 111 QAYDASI</div>
                  <div style={{color:"#94a3b8",fontSize:"13px",lineHeight:1.7}}>
                    {cBase===cS?<span>⚠️ <strong style={{color:"#f59e0b"}}>Sonuncu əməkhaqqı</strong> orta əməkhaqqından böyükdür.</span>:<span>✅ <strong style={{color:"#34d399"}}>Orta əməkhaqqı</strong> sonuncu əməkhaqqından böyükdür.</span>}
                  </div>
                  <div style={{marginTop:"9px",padding:"9px",background:"#060d16",borderRadius:"8px",fontSize:"11px",color:"#64748b",fontStyle:"italic"}}>"...sonuncu əməkhaqqından az olmamaqla, orta əməkhaqqı saxlanılır..." — Maddə 111/1</div>
                </div>
              </div>
            </div>
          </div>
        )}
      </div>

      {/* MODALS */}
      {docEmp&&<DocModal emp={docEmp} onClose={()=>setDocEmp(null)} onMarkUsed={markUsed}/>}
      {editEmp&&<EmpModal initial={editEmp} onSave={saveEmp} onClose={()=>setEditEmp(null)}/>}
      {delEmp&&<DelModal emp={delEmp} onConfirm={delEmpFn} onClose={()=>setDelEmp(null)}/>}
      {showAdd&&<EmpModal onSave={addEmp} onClose={()=>setShowAdd(false)}/>}
      {showImport&&<ImportModal existing={emps} onImport={importEmps} onClose={()=>setShowImport(false)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
